version: '3.8'

services:

  master:
    image: nginx
    container_name: master
    ports:
      - "8080:80"
    volumes:
      - C:\Users\user\Downloads\Java-workspace\Docker_demo/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - worker1
      - worker2
      - worker3

  worker1:
    image: nginx
    container_name: worker1

  worker2:
    image: nginx
    container_name: worker2

  worker3:
    image: nginx
    container_name: worker3
